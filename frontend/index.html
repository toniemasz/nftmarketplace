<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>NFT Marketplace</title>
</head>
<body>
<nav>
<a href="index.html">Home</a>
<a href="wallet.html">My Wallet</a>
<a href="market.html">Market</a>
<a href="#" id="logout">Logout</a>
</nav>
<section id="content">
<h2>Login</h2>
<form id="loginForm">
<input name="username" placeholder="username" required>
<input type="password" name="password" placeholder="password" required>
<button type="submit">Login</button>
</form>
<p>or register:</p>
<form id="registerForm">
<input name="username" placeholder="username" required>
<input type="password" name="password" placeholder="password" required>
<button type="submit">Register</button>
</form>
</section>
<script>
async function check(){
 const res = await fetch('/me');
 if(res.ok){
  location.href='wallet.html';
 }
}
check();

document.getElementById('loginForm').onsubmit = async e => {
 e.preventDefault();
 const data = Object.fromEntries(new FormData(e.target));
 const res = await fetch('/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
 if(res.ok) location.href='wallet.html'; else alert('login failed');
};

document.getElementById('registerForm').onsubmit = async e => {
 e.preventDefault();
 const data = Object.fromEntries(new FormData(e.target));
 const res = await fetch('/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
 if(res.ok) alert('registered'); else alert('error');
};

document.getElementById('logout').onclick = async ()=>{await fetch('/logout');location.href='index.html';};
</script>
</body>
</html>
